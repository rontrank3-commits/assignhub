name: CI/CD - AssignHub

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ============================================================
  # JOB 1: LINT & CODE QUALITY
  # Kiểm tra cú pháp PHP của toàn bộ project trước khi build/test
  # ============================================================
  lint:
    name: Lint PHP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpcs

      - name: Kiểm tra cú pháp PHP (php -l) cho toàn bộ file .php
        run: |
          error=0
          for f in $(find . -name "*.php" -not -path "./uploads/*"); do
            php -l "$f" || error=1
          done
          exit $error

      - name: Kiểm tra coding standard (PSR-12) - cảnh báo, không chặn build
        run: phpcs --standard=PSR12 --extensions=php --ignore=uploads/* . || true

  # ============================================================
  # JOB 2: BUILD & TEST
  # Dựng môi trường MySQL, import schema AI.sql, chạy PHP built-in
  # server và kiểm tra smoke test các trang chính trả về HTTP 200
  # ============================================================
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, gd

      - name: Chờ MySQL sẵn sàng
        run: |
          for i in {1..15}; do
            mysqladmin ping -h127.0.0.1 -uroot -proot --silent && break
            sleep 2
          done

      # LƯU Ý: AI.sql tự CREATE DATABASE `assignhub` (không phải "AI"),
      # nên không truyền tên DB ở đây - để script tự tạo đúng database của nó.
      - name: Import database schema (AI.sql)
        run: mysql -h127.0.0.1 -uroot -proot < AI.sql

      - name: Điều chỉnh cấu hình DB cho môi trường CI
        # includes/db.php đang khai báo DB_NAME là 'AI', nhưng AI.sql thực
        # tế tạo database tên 'assignhub' -> đây là bug lệch tên trong code.
        # Bước này vá tạm để pipeline chạy được; cần sửa tận gốc trong db.php.
        run: |
          sed -i "s/DB_NAME', 'AI'/DB_NAME', 'assignhub'/" includes/db.php
          sed -i "s/DB_PASS', ''/DB_PASS', 'root'/" includes/db.php

      - name: Khởi động PHP built-in server
        run: |
          php -S 127.0.0.1:8080 -t . &
          sleep 3

      - name: Smoke test - kiểm tra các trang chính phản hồi HTTP 200/302
        run: |
          set -e
          check() {
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8080/$1")
            echo "GET /$1 -> $code"
            if [[ "$code" != "200" && "$code" != "302" ]]; then
              echo "FAIL: $1 trả về mã lỗi $code"
              exit 1
            fi
          }
          check "login.php"
          check "register.php"
          check "index.php"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: assignhub-build
          path: |
            .
            !.git
            !uploads

  # ============================================================
  # JOB 3: SECURITY SCAN
  # Quét rò rỉ thông tin nhạy cảm (secrets, API key, password)
  # ============================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Quét secret bị lộ trong code (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # JOB 4: DEPLOY (CD)
  # Chỉ chạy khi push vào nhánh main VÀ 3 job trên pass
  # Đóng gói artifact và deploy lên server qua FTP/SSH
  # ============================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: assignhub-build
          path: build

      - name: Deploy qua FTP lên hosting
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./build/
          exclude: |
            **/.git*/**
            **/uploads/**

      - name: Thông báo kết quả deploy
        run: echo "Deploy hoàn tất tại $(date)"

<?xml version="1.0" encoding="UTF-8"?>
<!-- Simple, accessible SVG illustration for AssignHub hero -->
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="Illustration: managing assignments on laptop">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#6366f1" />
      <stop offset="1" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef2ff" />
      <stop offset="1" stop-color="#eef0fe" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="transparent"/>

  <!-- Laptop base -->
  <g transform="translate(120,140)">
    <rect x="40" y="80" rx="12" ry="12" width="520" height="300" fill="#0f172a" opacity="0.92"/>
    <rect x="70" y="110" rx="8" ry="8" width="460" height="220" fill="url(#g2)"/>

    <!-- Document on screen -->
    <rect x="120" y="140" width="240" height="160" rx="6" fill="#fff"/>
    <rect x="140" y="164" width="200" height="12" rx="3" fill="#e6e9f8"/>
    <rect x="140" y="186" width="160" height="12" rx="3" fill="#e6e9f8"/>
    <rect x="140" y="208" width="180" height="12" rx="3" fill="#e6e9f8"/>

    <!-- Checklist card -->
    <g transform="translate(370,150)">
      <rect width="140" height="120" rx="10" fill="#fff"/>
      <circle cx="28" cy="28" r="10" fill="url(#g1)"/>
      <rect x="52" y="20" width="68" height="8" rx="4" fill="#e6e9f8"/>
      <rect x="10" y="56" width="120" height="8" rx="4" fill="#e6e9f8"/>
      <rect x="10" y="80" width="90" height="8" rx="4" fill="#e6e9f8"/>
      <path d="M24 24 L32 32 L46 18" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Keyboard -->
    <rect x="60" y="260" width="480" height="30" rx="6" fill="#0b1220"/>
  </g>

  <!-- Floating badge -->
  <g transform="translate(540,48)">
    <circle cx="0" cy="0" r="44" fill="url(#g1)" opacity="0.95"/>
    <path d="M-12 0 L-4 8 L8 -6" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(8,6) rotate(20)"/>
    <text x="0" y="6" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-weight="700" font-size="18" fill="#fff">Assign</text>
  </g>

  <!-- Subtle shadow -->
  <ellipse cx="400" cy="480" rx="220" ry="28" fill="#0f172a" opacity="0.06"/>
</svg>
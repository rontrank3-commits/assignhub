name: CI/CD - AssignHub

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

 
  lint:
    name: Lint PHP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpcs

      - name: Kiểm tra cú pháp PHP (php -l) cho toàn bộ file .php
        run: |
          error=0
          for f in $(find . -name "*.php" -not -path "./uploads/*"); do
            php -l "$f" || error=1
          done
          exit $error

      - name: Kiểm tra coding standard (PSR-12) - cảnh báo, không chặn build
        run: phpcs --standard=PSR12 --extensions=php --ignore=uploads/* . || true

 
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, gd

      - name: Chờ MySQL sẵn sàng
        run: |
          for i in {1..15}; do
            mysqladmin ping -h127.0.0.1 -uroot -proot --silent && break
            sleep 2
          done

     
      - name: Import database schema (AI.sql)
        run: mysql -h127.0.0.1 -uroot -proot < AI.sql

      - name: Điều chỉnh cấu hình DB cho môi trường CI
       
        run: |
          sed -i "s/DB_NAME', 'AI'/DB_NAME', 'assignhub'/" includes/db.php
          sed -i "s/DB_PASS', ''/DB_PASS', 'root'/" includes/db.php

      - name: Khởi động PHP built-in server
        run: |
          php -S 127.0.0.1:8080 -t . &
          sleep 3

      - name: Smoke test - kiểm tra các trang chính phản hồi HTTP 200/302
        run: |
          set -e
          check() {
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8080/$1")
            echo "GET /$1 -> $code"
            if [[ "$code" != "200" && "$code" != "302" ]]; then
              echo "FAIL: $1 trả về mã lỗi $code"
              exit 1
            fi
          }
          check "login.php"
          check "register.php"
          check "index.php"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: assignhub-build
          path: |
            .
            !.git
            !uploads

 
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Quét secret bị lộ trong code (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

 
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: assignhub-build
          path: build

    
      - name: Cấu hình DB production trước khi deploy
        run: |
          sed -i "s/DB_HOST', 'localhost'/DB_HOST', '${{ secrets.DB_HOST }}'/" build/includes/db.php
          sed -i "s/DB_NAME', 'AI'/DB_NAME', '${{ secrets.DB_NAME }}'/" build/includes/db.php
          sed -i "s/DB_USER', 'root'/DB_USER', '${{ secrets.DB_USER }}'/" build/includes/db.php
          sed -i "s/DB_PASS', ''/DB_PASS', '${{ secrets.DB_PASS }}'/" build/includes/db.php

      - name: Deploy qua FTPS (explicit) lên hosting
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./build/
          exclude: |
            **/.git*/**
            **/uploads/**

      - name: Thông báo kết quả deploy
        run: echo "Deploy hoàn tất tại $(date)"
